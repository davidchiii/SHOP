
services:
  shop:
    build: .
    container_name: flask_app
    restart: always
    expose:
      - "8000"

  nginx:
    image: nginx:stable
    container_name: nginx
    depends_on:
      - shop
    ports:
      - "80:80"
    volumes:
      - ./nginx/http.conf:/etc/nginx/nginx.conf:ro
    restart: always