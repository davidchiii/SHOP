<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog Viewer</title>

    <!-- Tailwind CDN (quick setup) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">
    <body class="bg-gray-100 min-h-screen">

    <div class="max-w-6xl mx-auto p-6">

        <input 
            type="file" 
            id="csvFile"
            accept=".csv"
            class="block w-full mb-6 p-3 border rounded-lg bg-white shadow-sm cursor-pointer"
        />

        <div id="grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>

    </div>

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">Catalog Upload</h1>

        <input 
            type="file" 
            id="csvFile" 
            accept=".csv"
            class="block w-full mb-6 p-3 border rounded-lg bg-white shadow-sm cursor-pointer"
        />

        <div id="grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>
    </div>

    <script>
        document.getElementById("csvFile").addEventListener("change", function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split("\n").map(r => r.trim()).filter(r => r);

                const headers = rows[0].split(",");

                const data = rows.slice(1).map(row => {
                    const values = row.split(",");
                    let obj = {};
                    headers.forEach((h, i) => {
                        obj[h.trim()] = values[i]?.trim();
                    });
                    return obj;
                });

                renderTiles(data);
            };

            reader.readAsText(file);
        });

        function renderTiles(items) {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            items.forEach(item => {
                const tile = document.createElement("div");
                tile.className = "bg-white rounded-xl shadow-md p-5 hover:shadow-lg transition";

                tile.innerHTML = `
                    <h3 class="text-xl font-semibold mb-2">
                        ${item.name || "Unnamed Item"}
                    </h3>

                    <div class="space-y-1 text-sm text-gray-700">
                        <p><span class="font-medium">Code:</span> ${item.item_code}</p>
                        <p><span class="font-medium">Price:</span> $${item.price}</p>
                        <p><span class="font-medium">Quantity:</span> ${item.quantity}</p>
                        <p><span class="font-medium">Make:</span> ${item.make}</p>
                        <p><span class="font-medium">Model:</span> ${item.model}</p>
                    </div>
                `;

                grid.appendChild(tile);
            });
        }
    </script>

</body>
</html>
